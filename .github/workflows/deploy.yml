name: Deploy scrap.domse.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: scrap-domse-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, rust-scrap]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy built site
        run: |
          set -euo pipefail
          rsync -a --delete --omit-dir-times \
            "$GITHUB_WORKSPACE/dist/" /srv/rust-scrap-calculator-site/
          printf '%s' "$GITHUB_SHA" > /srv/rust-scrap-calculator-site/.deployed-revision
